<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel Login</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #0b1220;
            color: #e5e7eb;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        .card {
            width: min(420px, 92vw);
            background: #0f1a2b;
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 14px;
            padding: 18px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 18px;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            color: #9ca3af;
            font-size: 12px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: #0c1728;
            color: #e5e7eb;
        }

        button {
            margin-top: 14px;
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: #111f33;
            color: #e5e7eb;
            cursor: pointer;
            font-weight: 650;
        }

        .msg {
            margin-top: 12px;
            font-size: 13px;
            color: #9ca3af;
        }

        .err {
            color: #ffb4b4;
        }

        a {
            color: #e5e7eb;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Admin Login</h1>

        <label>Username</label>
        <input id="u" autocomplete="username" />

        <label>Password</label>
        <input id="p" type="password" autocomplete="current-password" />

        <button id="btn">Login</button>

        <div id="msg" class="msg"></div>
        <div class="msg"><a href="index.html">Back to panel</a></div>
    </div>

    <script>
        const msg = document.getElementById("msg");
        document.getElementById("btn").addEventListener("click", async () => {
            msg.textContent = "Logging in...";
            msg.classList.remove("err");

            const payload = { username: document.getElementById("u").value, password: document.getElementById("p").value };

            try {
                const res = await fetch("api.php?op=login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) throw new Error(data.error || "Login failed");

                // success: go back to panel
                location.href = "index.html";
            } catch (e) {
                msg.textContent = e.message;
                msg.classList.add("err");
            }
        });
    </script>
</body>

</html>
